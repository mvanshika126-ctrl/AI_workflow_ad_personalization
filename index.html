<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VitaForge — Generate Your Personalized Page</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F7F8F6;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #E4E7E3;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 660px;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2rem;
    }
    .logo-mark {
      width: 34px;
      height: 34px;
      background: #0F6E56;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-mark svg { width: 18px; height: 18px; fill: white; }
    .logo-text { font-size: 18px; font-weight: 600; color: #0F6E56; letter-spacing: -0.3px; }

    /* Heading */
    h1 { font-size: 22px; font-weight: 600; color: #1A1A1A; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #6B7280; margin-bottom: 2rem; line-height: 1.5; }

    hr { border: none; border-top: 1px solid #E4E7E3; margin: 0 0 2rem; }

    /* Fields */
    .field { margin-bottom: 1.5rem; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #6B7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    textarea, input[type="url"], select {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #D1D5DB;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: #1A1A1A;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    textarea { min-height: 110px; resize: vertical; line-height: 1.6; }
    textarea::placeholder, input::placeholder { color: #9CA3AF; }

    textarea:focus, input[type="url"]:focus, select:focus {
      border-color: #0F6E56;
      box-shadow: 0 0 0 3px rgba(15, 110, 86, 0.12);
    }

    select {
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 7L11 1' stroke='%236B7280' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 14px center;
      cursor: pointer;
    }

    /* Preset chips */
    .chips-label {
      font-size: 12px;
      font-weight: 500;
      color: #9CA3AF;
      margin: 10px 0 8px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid #0F6E56;
      background: transparent;
      font-size: 12px;
      font-weight: 500;
      color: #0F6E56;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
    }
    .chip:hover, .chip.active {
      background: #0F6E56;
      color: #fff;
    }

    /* Two-column row */
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* CTA button */
    .btn {
      width: 100%;
      padding: 15px;
      background: #0F6E56;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:hover { background: #0a5a45; }
    .btn:active { transform: scale(0.99); }
    .btn-icon {
      width: 22px; height: 22px;
      background: rgba(255,255,255,0.2);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Toast */
    #toast {
      display: none;
      margin-top: 1rem;
      padding: 12px 16px;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 10px;
      font-size: 13px;
      color: #B91C1C;
    }

    @media (max-width: 500px) {
      .row { grid-template-columns: 1fr; }
      .card { padding: 2rem 1.25rem; }
    }
  </style>
</head>
<body>

<div class="card">

  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L8 8H4l4 4-2 8 6-4 6 4-2-8 4-4h-4z"/>
      </svg>
    </div>
    <span class="logo-text">VitaForge</span>
  </div>

  <h1>Generate your personalized page</h1>
  <p class="subtitle">Describe your ad creative and we'll tailor a landing page that converts.</p>

  <hr />

  <!-- Ad Creative -->
  <div class="field">
    <label>Ad creative description</label>
    <textarea id="adText" placeholder="Instagram ad showing tired office worker. Headline: Stop the 3pm crash. CTA: Try risk-free"></textarea>
    <p class="chips-label">Quick presets</p>
    <div class="chips">
      <button class="chip" data-val="Instagram Reel showing someone dragging through their morning. Headline: No more 3pm crashes. CTA: Get your energy back today">Energy boost</button>
      <button class="chip" data-val="Facebook ad with a person finally sleeping soundly. Headline: Wake up actually rested. CTA: Try VitaForge Sleep free">Sleep support</button>
      <button class="chip" data-val="Static Instagram post with bold shield graphic. Headline: Your immune system called — it needs backup. CTA: Shop immunity blends">Immunity</button>
      <button class="chip" data-val="TikTok-style before/after video. Headline: Same jeans. 6 weeks later. CTA: Start your transformation">Weight loss</button>
      <button class="chip" data-val="Google Display ad with clean desk aesthetic. Headline: Think sharper, work faster. CTA: Unlock your focus">Focus</button>
    </div>
  </div>

  <!-- Landing page URL -->
  <div class="field">
    <label>Landing page URL</label>
    <input type="url" id="pageUrl" placeholder="https://vitaforge.com/landing/energy-boost" />
  </div>

  <!-- Audience + Traffic -->
  <div class="row">
    <div class="field">
      <label>Target audience</label>
      <select id="audience">
        <option value="" disabled selected>Select audience</option>
        <option>Busy professionals</option>
        <option>Fitness enthusiasts</option>
        <option>Women over 40</option>
        <option>College students</option>
      </select>
    </div>
    <div class="field">
      <label>Traffic source</label>
      <select id="traffic">
        <option value="" disabled selected>Select source</option>
        <option>Instagram</option>
        <option>Facebook</option>
        <option>Google Ads</option>
        <option>TikTok</option>
        <option>YouTube</option>
      </select>
    </div>
  </div>

  <!-- Submit -->
  <button class="btn" onclick="handleGenerate()">
    <div class="btn-icon">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </div>
    Generate personalized page
  </button>

  <div id="toast">Please fill in all fields before generating.</div>

</div>

<script>
  // Preset chips
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      document.getElementById('adText').value = chip.dataset.val;
    });
  });

  // Form submission
  function handleGenerate() {
    const ad       = document.getElementById('adText').value.trim();
    const url      = document.getElementById('pageUrl').value.trim();
    const audience = document.getElementById('audience').value;
    const traffic  = document.getElementById('traffic').value;
    const toast    = document.getElementById('toast');

    if (!ad || !url || !audience || !traffic) {
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 3000);
      return;
    }

    toast.style.display = 'none';

    // TODO: replace with your API call or routing logic
    const payload = { adCreative: ad, landingPageUrl: url, audience, trafficSource: traffic };
    console.log('VitaForge payload:', payload);
    alert('Form submitted! Check the console for payload data.\n\nConnect this to your page-generation API.');
  }
</script>

</body>
</html>
